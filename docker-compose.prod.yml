services:
  nginx:
    image: nginx:alpine
    container_name: satflux_nginx_prod
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/public:ro
      - ./storage:/var/www/storage:rw
    depends_on:
      php:
        condition: service_healthy
    networks:
      - satflux
      - passbolt_default
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.satflux-https.entrypoints=websecure"
      - "traefik.http.routers.satflux-https.rule=Host(`satflux.io`)"
      - "traefik.http.routers.satflux-https.tls=true"
      - "traefik.http.routers.satflux-https.tls.certresolver=letsencrypt"
      - "traefik.http.services.satflux.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost/health || curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: satflux_php_prod
    volumes:
      - .:/var/www:rw
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    working_dir: /var/www
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - satflux
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - PHP_OPCACHE_ENABLE=1
    healthcheck:
      test: ["CMD-SHELL", "php -r 'echo \"OK\";' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: satflux_postgres_prod
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - satflux
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: satflux_redis_prod
    env_file:
      - .env.production
    command: >
      sh -c "
        if [ -n \"$$REDIS_PASSWORD\" ] && [ \"$$REDIS_PASSWORD\" != \"null\" ]; then 
          redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\"; 
        else 
          redis-server --appendonly yes; 
        fi
      "
    volumes:
      - redis_data:/data
    networks:
      - satflux
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a \"$REDIS_PASSWORD\"} ping | grep -q PONG"]
      interval: 10s
      timeout: 4s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local
    external: true
    name: satflux_prod_postgres_data
  redis_data:
    driver: local
    external: true
    name: satflux_prod_redis_data
networks:
  satflux:
    external: true
    name: satflux_prod
  passbolt_default:
    external: true