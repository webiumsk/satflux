version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: uzol21_nginx_prod
    ports:
      - "127.0.0.1:8080:80"  # Bind to localhost only - use reverse proxy on host
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/public:ro
      - ./storage:/var/www/storage:rw
    depends_on:
      php:
        condition: service_healthy
    networks:
      - uzol21
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: uzol21_php_prod
    volumes:
      - .:/var/www:rw
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    working_dir: /var/www
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - uzol21
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - PHP_OPCACHE_ENABLE=1
    healthcheck:
      test: ["CMD-SHELL", "php -r 'echo \"OK\";' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: uzol21_postgres_prod
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${DB_DATABASE:-uzol21}
      POSTGRES_USER: ${DB_USERNAME:-uzol21}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - uzol21
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-uzol21} -d ${DB_DATABASE:-uzol21}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: uzol21_redis_prod
    env_file:
      - .env.production
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then 
        redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\"; 
      else 
        redis-server --appendonly yes; 
      fi"
    volumes:
      - redis_data:/data
    networks:
      - uzol21
    restart: unless-stopped
    healthcheck:
      test: >
        sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then 
          redis-cli -a \"$$REDIS_PASSWORD\" ping; 
        else 
          redis-cli ping; 
        fi"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  uzol21:
    driver: bridge
    name: uzol21_prod

