name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: PHP (tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Create bootstrap cache directory
        run: mkdir -p bootstrap/cache && chmod -R 777 bootstrap/cache

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php -r "file_put_contents('.env', preg_replace('/^APP_KEY=.*/m', 'APP_KEY=base64:'.base64_encode(random_bytes(32)), file_get_contents('.env')));"

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Validate composer configuration
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: php artisan test

      - name: Check code style (Pint)
        run: vendor/bin/pint --test

      - name: Static analysis (PHPStan/Larastan)
        run: vendor/bin/phpstan analyse --memory-limit=1G --no-progress

      - name: Security audit (composer)
        run: composer audit

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      # No BTCPay Server and no redis in this job: sqlite + file cache +
      # sync queue, local-first invoicing build, relay sync disabled. The
      # scenarios only cover flows that work against this stack (see
      # docs/E2E_HARNESS.md).
      - name: Prepare environment
        run: |
          cp .env.example .env
          php -r "file_put_contents('.env', preg_replace('/^APP_KEY=.*/m', 'APP_KEY=base64:'.base64_encode(random_bytes(32)), file_get_contents('.env')));"
          sed -i \
            -e 's|^APP_URL=.*|APP_URL=http://localhost:8000|' \
            -e 's|^DB_CONNECTION=.*|DB_CONNECTION=sqlite|' \
            -e 's|^CACHE_STORE=.*|CACHE_STORE=file|' \
            -e 's|^QUEUE_CONNECTION=.*|QUEUE_CONNECTION=sync|' \
            .env
          sed -i '/^DB_HOST=/d;/^DB_PORT=/d;/^DB_DATABASE=/d;/^DB_USERNAME=/d;/^DB_PASSWORD=/d' .env
          {
            echo "DB_DATABASE=${{ github.workspace }}/database/e2e.sqlite"
            echo "VITE_INVOICING_LOCAL_FIRST=true"
            echo "VITE_EVOLU_RELAY_URL="
            echo "BTCPAY_BASE_URL=http://localhost:14142"
            echo "BTCPAY_API_KEY=stub-server-key"
          } >> .env
          # Seed-first off for e2e: the seeded user logs in with a password
          # (an enrolled recovery key would disable password login), and an
          # un-enrolled user under seed-first gets the mandatory migration
          # wizard overlay, which blocks every UI interaction. Replace in
          # place - .env.example sets it to true and dotenv keeps the first
          # definition it sees.
          sed -i 's|^SEED_FIRST_REGISTRATION=.*|SEED_FIRST_REGISTRATION=false|' .env
          mkdir -p bootstrap/cache && chmod -R 777 bootstrap/cache
          touch database/e2e.sqlite

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Migrate and seed the e2e fixture user
        env:
          E2E_BTCPAY: "1"
        run: |
          php artisan migrate --force
          php artisan db:seed --class=E2eTestSeeder --force

      - name: Start BTCPay Greenfield stub
        env:
          APP_URL: http://localhost:8000
          BTCPAY_STUB_PORT: "14142"
        run: |
          node e2e/btcpay-stub/server.mjs &
          for i in $(seq 1 15); do
            curl -sf http://localhost:14142/_stub/state >/dev/null && break
            sleep 1
          done
          if ! curl -sf http://localhost:14142/_stub/state >/dev/null; then
            echo "::error::BTCPay stub failed to start on :14142 within 15s"
            exit 1
          fi

      - name: Start application server
        run: |
          php artisan serve --port=8000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/login >/dev/null && break
            sleep 1
          done
          if ! curl -sf http://localhost:8000/login >/dev/null; then
            echo "::error::Application server failed to start on http://localhost:8000 within 30s"
            exit 1
          fi

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        env:
          APP_URL: http://localhost:8000
          E2E_SEEDED_USER: "1"
          E2E_INVOICING_LOCAL_FIRST: "1"
          E2E_BTCPAY: "1"
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  frontend:
    name: Node (lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit (npm, production deps)
        run: npm audit --omit=dev --audit-level=critical

      - name: Lint
        run: npm run lint

      - name: Locale parity
        run: npm run test:locale-parity

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
