# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Update cadence and PR-noise control. Patch updates per ecosystem are grouped
# into a single PR so they can be auto-processed together (see
# .github/workflows/dependabot-auto.yml and docs/DEPENDABOT_MAINTENANCE.md);
# minor and major bumps come as individual PRs for manual review.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
    groups:
      npm-patch:
        applies-to: version-updates
        update-types:
          - patch
    # Deferred majors - each needs a dedicated migration, not a dep bump.
    # Minor/patch still flow. Revisit per docs/DEPENDABOT_MAINTENANCE.md.
    ignore:
      # vite 8 = Rolldown/Oxc migration (esbuild no longer bundled;
      # optimizeDeps.esbuildOptions -> rolldownOptions, transformWithEsbuild).
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      # laravel-vite-plugin v3 requires vite ^8 - coupled with the vite migration.
      - dependency-name: "laravel-vite-plugin"
        update-types: ["version-update:semver-major"]
      # vue-router v5 = build-time/typed router; needs vite 8 + pinia 3 +
      # @pinia/colada and a routing rewrite (we use the v4 runtime API).
      - dependency-name: "vue-router"
        update-types: ["version-update:semver-major"]
      # tiptap 3 = coordinated migration across all 16 @tiptap/* packages.
      - dependency-name: "@tiptap/*"
        update-types: ["version-update:semver-major"]
      # @vue/eslint-config-typescript v14 requires ESLint 9 (flat config migration).
      - dependency-name: "@vue/eslint-config-typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: composer
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - php
    groups:
      composer-patch:
        applies-to: version-updates
        update-types:
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - github-actions
    groups:
      actions-patch:
        applies-to: version-updates
        update-types:
          - patch
