services:
  nginx:
    image: nginx:alpine
    container_name: uzol21_nginx
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./public:/var/www/public
      - ./storage:/var/www/storage
    depends_on:
      - php
    networks:
      - uzol21

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: uzol21_php
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    working_dir: /var/www
    depends_on:
      - postgres
      - redis
    networks:
      - uzol21
    environment:
      - PHP_OPCACHE_ENABLE=1

  postgres:
    image: postgres:16-alpine
    container_name: uzol21_postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-uzol21}
      POSTGRES_USER: ${DB_USERNAME:-uzol21}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-uzol21}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - uzol21

  redis:
    image: redis:7-alpine
    container_name: uzol21_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - uzol21
      
  mailpit:
    image: axllent/mailpit
    container_name: uzol21_mailpit
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web UI
    networks:
      - uzol21

  adminer:
    image: adminer
    container_name: uzol21_adminer
    ports:
      - "8081:8080"
    networks:
      - uzol21
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:

networks:
  uzol21:
    driver: bridge








