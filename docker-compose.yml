services:
  nginx:
    image: nginx:alpine
    container_name: satflux.io_nginx
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./public:/var/www/public
      - ./storage:/var/www/storage
    depends_on:
      - php
    networks:
      - satflux.io

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: satflux.io_php
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    working_dir: /var/www
    depends_on:
      - postgres
      - redis
    networks:
      - satflux.io
    environment:
      - PHP_OPCACHE_ENABLE=1

  postgres:
    image: postgres:16-alpine
    container_name: satflux.io_postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-satflux.io}
      POSTGRES_USER: ${DB_USERNAME:-satflux.io}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-satflux.io}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - satflux.io

  redis:
    image: redis:7-alpine
    container_name: satflux.io_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - satflux.io
      
  mailpit:
    image: axllent/mailpit
    container_name: satflux.io_mailpit
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web UI
    networks:
      - satflux.io

  adminer:
    image: adminer
    container_name: satflux.io_adminer
    ports:
      - "8081:8080"
    networks:
      - satflux.io
    depends_on:
      - postgres

  nwc-connector:
    build:
      context: ./nwc-connector
      dockerfile: Dockerfile
    container_name: satflux.io_nwc_connector
    ports:
      - "8082:8082"
    environment:
      NWC_HTTP_ADDR: ":8082"
      DATABASE_URL: "postgres://${DB_USERNAME:-satflux.io}:${DB_PASSWORD:-satflux.io}@postgres:5432/${DB_DATABASE:-satflux.io}?sslmode=disable"
      NWC_RELAY_URL: "${NWC_RELAY_URL:-wss://relay.getalby.com/v1}"
      NWC_MASTER_KEY: "${NWC_MASTER_KEY:-}"
      NWC_PANEL_API_KEY: "${NWC_PANEL_API_KEY:-}"
    depends_on:
      - postgres
    networks:
      - satflux.io
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  satflux.io:
    driver: bridge








