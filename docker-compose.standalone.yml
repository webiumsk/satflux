# satflux.io — standalone deployment
# Standalone stack without Traefik: Caddy as reverse proxy and TLS (Let's Encrypt).
#
# Usage:
#   1. Copy .env.example to .env.standalone and fill in values
#   2. Production with a domain: SITE_ADDRESS=example.com, map ports 80:80 and 443:443
#   3. Dev / HTTP-only lab: SITE_ADDRESS=localhost:80, e.g. map 8090:80
#   4. docker compose -f docker-compose.standalone.yml --env-file .env.standalone up -d

services:
  caddy:
    image: caddy:alpine
    container_name: satflux_caddy_standalone
    restart: unless-stopped
    ports:
      - "${STANDALONE_HTTP_PORT:-80}:80"
      - "${STANDALONE_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - satflux_caddy_data:/data
      - satflux_caddy_config:/config
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-localhost:80}
      ACME_EMAIL: ${ACME_EMAIL:-admin@localhost}
    networks:
      - satflux
    depends_on:
      nginx:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: satflux_nginx_standalone
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/public:ro
      - ./storage:/var/www/storage:rw
    depends_on:
      php:
        condition: service_healthy
      reverb:
        condition: service_started
    networks:
      - satflux
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost/health || curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: satflux_php_standalone
    volumes:
      - .:/var/www:rw
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    working_dir: /var/www
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - satflux
    restart: unless-stopped
    env_file:
      - .env.standalone
    environment:
      - PHP_OPCACHE_ENABLE=1
    healthcheck:
      test: ["CMD-SHELL", "php -r 'echo \"OK\";' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  reverb:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: satflux_reverb_standalone
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    volumes:
      - .:/var/www:rw
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    working_dir: /var/www
    depends_on:
      php:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - satflux
    restart: unless-stopped
    env_file:
      - .env.standalone
    environment:
      - REVERB_SERVER_HOST=0.0.0.0
      - REVERB_SERVER_PORT=8080

  queue:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: satflux_queue_standalone
    command: ["sh", "-c", "php artisan queue:work $${QUEUE_CONNECTION:-redis} --sleep=3 --tries=3 --max-time=3600 --queue=webhooks,exports"]
    volumes:
      - .:/var/www:rw
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    working_dir: /var/www
    depends_on:
      php:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - satflux
    restart: unless-stopped
    env_file:
      - .env.standalone
    healthcheck:
      test: ["CMD-SHELL", "php -r 'echo \"OK\";' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  scheduler:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: satflux_scheduler_standalone
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - .:/var/www:rw
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    working_dir: /var/www
    depends_on:
      php:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - satflux
    restart: unless-stopped
    env_file:
      - .env.standalone
    healthcheck:
      test: ["CMD-SHELL", "php -r 'echo \"OK\";' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: satflux_postgres_standalone
    env_file:
      - .env.standalone
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - satflux
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: satflux_redis_standalone
    env_file:
      - .env.standalone
    command: >
      sh -c "
        if [ -n \"$$REDIS_PASSWORD\" ] && [ \"$$REDIS_PASSWORD\" != \"null\" ]; then
          redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\";
        else
          redis-server --appendonly yes;
        fi
      "
    volumes:
      - redis_data:/data
    networks:
      - satflux
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a \"$REDIS_PASSWORD\"} ping | grep -q PONG"]
      interval: 10s
      timeout: 4s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
  satflux_caddy_data:
  satflux_caddy_config:

networks:
  satflux:
    driver: bridge
