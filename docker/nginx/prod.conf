server {
    listen 80;
    server_name _;
    
    root /var/www/public;
    index index.php;
    
    # Set default charset
    charset utf-8;

    # Pass X-Forwarded-* headers for Cloudflare/proxy support
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;
    real_ip_recursive on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Optional strict CSP (uncomment and adjust). Evolu invoicing sync needs connect-src to relay hosts:
    # add_header Content-Security-Policy "default-src 'self'; connect-src 'self' wss://relay.satflux.io wss://free.evoluhq.com wss://*.satflux.io https://chorala.com; ..." always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    # Disable gzip for already compressed files (Vite already compresses)
    gzip_disable "msie6";

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # BTCPay Raffle public routes (/raffle/...). Copy docker/nginx/btcpay-public.conf.example
    # to docker/nginx/btcpay-public.conf and set your BTCPay upstream when the panel
    # shares the same hostname as BTCPay (e.g. satflux.org).
    include /etc/nginx/conf.d/btcpay-public.conf;

    # Vite production build (must not fall through to index.php)
    location ^~ /build/ {
        # Prebuilt assets are minified; gzip here + Caddy/Cloudflare compression can yield
        # intermittent empty bodies (200 with content-length 0) for module scripts.
        gzip off;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Main location block
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Forward proxy headers
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PORT $http_x_forwarded_port;
        
        # Security
        fastcgi_hide_header X-Powered-By;
        
        # Timeouts
        fastcgi_connect_timeout 60;
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    # Static files caching (excluding /build/ - handled above)
    location ~* \.(jpg|jpeg|png|gif|ico|css|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Serve /storage/* - try symlink first, fallback to PHP/Laravel
    location ^~ /storage/ {
        # Try to serve file directly from symlink (public/storage -> storage/app/public)
        # If file not found, pass to Laravel's built-in storage serving
        try_files $uri /index.php?$query_string;
    }

    # Deny access to bootstrap/cache
    location ~ ^/bootstrap/cache {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Increase upload size
    client_max_body_size 20M;
    client_body_buffer_size 128k;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Laravel Reverb WebSocket (push notifications)
    location /app {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Scheme $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_read_timeout 86400;
        proxy_pass http://reverb:8080;
    }

    location /apps {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Scheme $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://reverb:8080;
    }
}

