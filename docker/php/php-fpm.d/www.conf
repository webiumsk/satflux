[www]
; Listen on TCP port (nginx connects to php:9000)
listen = 9000

; Run as www-data (matches Dockerfile USER)
user = www-data
group = www-data

; Process manager: more workers to avoid 504 under concurrent load
pm = dynamic
pm.max_children = 20
pm.start_servers = 2
pm.min_spare_servers = 2
pm.max_spare_servers = 10
; Recycle workers to limit memory leaks
pm.max_requests = 500

; Optional: log slow requests (seconds) for debugging
; request_slowlog_timeout = 5s
; slowlog = /proc/self/fd/2
